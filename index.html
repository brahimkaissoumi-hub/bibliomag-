:root{--grape:#6C3BFF;--sky:#00C2FF;--mint:#00E5A0;--sun:#FFD84D;--rose:#FF6B9D;--ink:#1a0533}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--ink);min-height:100vh}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes popIn{0%{transform:scale(0) rotate(-10deg);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideDown{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.float{animation:floatY 3.5s ease-in-out infinite}
.pop{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards}
.su{animation:slideUp .3s ease forwards}
button{cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
button:hover{transform:scale(1.04)}
button:active{transform:scale(.96)}
input,select{font-family:'Nunito',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#6C3BFF;border-radius:4px}
.star{position:fixed;border-radius:50%;background:white;pointer-events:none;animation:pulse 2s ease-in-out infinite}

async function sb(table,params="",opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${table}${params}`,{
    method:opts.method||"GET",
    headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Prefer":opts.prefer||"return=representation"},
    body:opts.body?JSON.stringify(opts.body):undefined
  });
  const tx=await r.text();
  if(!r.ok)throw new Error(tx||`err ${r.status}`);
  return tx?JSON.parse(tx):[];
}

// Stars background component
function Stars(){
  const s=Array.from({length:18},(_,i)=>({id:i,l:`${Math.random()*100}%`,t:`${Math.random()*100}%`,sz:Math.random()*2.5+1,del:`${Math.random()*3}s`,dur:`${1.5+Math.random()*2}s`}));
  return <>{s.map(x=><div key={x.id} className="star" style={{left:x.l,top:x.t,width:x.sz,height:x.sz,opacity:Math.random()*.5+.15,animationDuration:x.dur,animationDelay:x.del,zIndex:0}}/>)}</>;
}

// Toast
function Toast({t}){
  if(!t)return null;
  return <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#1a0533,#2d0a5e)",color:"white",borderRadius:20,padding:"12px 22px",zIndex:9999,fontWeight:800,fontSize:14,display:"flex",gap:8,alignItems:"center",boxShadow:"0 8px 32px rgba(108,59,255,0.5)",whiteSpace:"nowrap",border:"1px solid rgba(108,59,255,0.4)",animation:"slideDown .3s ease"}}><span style={{fontSize:18}}>{t.i}</span>{t.m}</div>;
}

function App(){
  const[lang,setLang]=useState("fr");
  const[page,setPage]=useState("home");
  const[filtre,setFiltre]=useState("all");

  const[livres,setLivres]=useState([]);
  const[eleves,setEleves]=useState([]);

  const[mesEmp,setMesEmp]=useState([]);
  const[mesBdg,setMesBdg]=useState([]);

  const[showAB,setShowAB]=useState(false);
  const[showAS,setShowAS]=useState(false);
  const[saving,setSaving]=useState(false);
  const[nb,setNb]=useState({titre_fr:"",titre_en:"",titre_ar:"",auteur:"",cover_emoji:"📚",type:"physique",genre_fr:"Conte",pages:100,couleur:"#FDE68A",disponible:true});
  const[ns,setNs]=useState({nom:"",code_acces:"",classe:"CM1",avatar:"🧒",role:"eleve"});

        sb("livres","?order=titre_fr.asc"),
        role==="admin"?sb("eleves","?order=nom.asc"):Promise.resolve([]),
        role==="admin"?sb("emprunts","?rendu=eq.false&select=*,eleves(nom,avatar),livres(titre_fr,titre_en,titre_ar,cover_emoji,couleur)"):Promise.resolve([]),
        sb("emprunts",`?eleve_id=eq.${uid}&rendu=eq.false&select=*,livres(id,titre_fr,titre_en,titre_ar,cover_emoji,couleur)`),
        sb("badges",`?eleve_id=eq.${uid}`)

  const login=async()=>{
    const c=code.trim().toUpperCase();if(!c)return;
    setLogging(true);setErr("");
    try{
      const r=await sb("eleves",`?code_acces=eq.${c}&limit=1`);
      if(!r.length)setErr(t.wrong);
      else{setUser(r[0]);await loadAll(r[0].id,r[0].role);}
    }catch(e){setErr("Err: "+e.message);}
    setLogging(false);
  };

  const borrow=async(l)=>{
    try{
      await sb("emprunts","",{method:"POST",body:{eleve_id:user.id,livre_id:l.id}});
      await sb("livres",`?id=eq.${l.id}`,{method:"PATCH",prefer:"return=minimal",body:{disponible:false}});
      toast2("Emprunté ! 🎉","🎉");setBModal(null);

    }catch(e){toast2("Erreur","❌");}

  const ret=async(eid,lid)=>{

    setSaving(false);

  const G={hero:"linear-gradient(135deg,#6C3BFF,#00C2FF)",warm:"linear-gradient(135deg,#FF6B9D,#FFD84D)",mint:"linear-gradient(135deg,#00E5A0,#00C2FF)",night:"linear-gradient(160deg,#1a0533 0%,#2d0a5e 50%,#0a1a3e 100%)"};

  const glassBorder="1px solid rgba(255,255,255,0.1)";

  const inp={width:"100%",padding:"11px 14px",borderRadius:13,border:"1px solid rgba(108,59,255,0.3)",background:"rgba(255,255,255,0.06)",color:"white",fontSize:14,fontWeight:600,outline:"none"};
  const lbl={fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",marginBottom:5,textAlign:rtl?"right":"left"};

      <div style={{display:"flex",gap:10,marginBottom:28,position:"relative",zIndex:1}}>
        {LANGS.map(l=>(
          <button key={l.c} onClick={()=>setLang(l.c)} style={{background:lang===l.c?"rgba(108,59,255,0.4)":"rgba(255,255,255,0.06)",border:lang===l.c?"2px solid rgba(108,59,255,0.7)":"2px solid rgba(255,255,255,0.12)",borderRadius:40,padding:"8px 16px",color:"white",fontSize:20,boxShadow:lang===l.c?"0 4px 16px rgba(108,59,255,0.4)":"none"}}>{l.f}</button>
        ))}
      </div>

      {/* Card */}
      <div style={{background:"rgba(255,255,255,0.06)",backdropFilter:"blur(24px)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:32,padding:30,width:"100%",maxWidth:380,boxShadow:"0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12)",position:"relative",zIndex:1}}>
        <div style={{fontWeight:800,fontSize:14,color:"rgba(255,255,255,0.6)",marginBottom:16,textAlign:rtl?"right":"left"}}>{t.code}</div>

        <input value={code} onChange={e=>{setCode(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder={t.ph}

  const AsModal=()=>showAS?(

                  <div style={{fontSize:22,fontWeight:900,color:s.c,fontFamily:"'Righteous',cursive"}}>{s.v}</div>

        {page==="catalogue"&&(

            <div style={{color:"rgba(255,255,255,0.35)",fontSize:12,fontWeight:600,marginBottom:14,textAlign:rtl?"right":"left"}}>{livres.filter(l=>l.disponible).length} {t.dispo.replace("✅ ","")}</div>

              <div style={{display:"flex",gap:7,flexDirection:rtl?"row-reverse":"row"}}>
                {["0.75x","1x","1.25x","1.5x"].map((v,i)=>(
                  <button key={i} style={{flex:1,padding:"9px 3px",borderRadius:11,fontWeight:800,fontSize:11,background:i===1?G.hero:"rgba(255,255,255,0.05)",color:i===1?"white":"rgba(255,255,255,0.4)",border:i===1?"none":"1px solid rgba(255,255,255,0.07)",boxShadow:i===1?"0 4px 12px rgba(108,59,255,0.4)":"none"}}>{v}</button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* PROFILE */}
        {page==="profile"&&(
          <div className="su" style={{padding:"16px 14px"}}>
            <div style={{background:"linear-gradient(135deg,#A855F7,#EC4899,#FF6B9D)",borderRadius:28,padding:22,textAlign:"center",marginBottom:16,boxShadow:"0 16px 48px rgba(168,85,247,0.35)",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.1)",pointerEvents:"none"}}/>
              <div style={{fontSize:54,marginBottom:7,filter:"drop-shadow(0 0 16px rgba(255,255,255,0.25))"}}>{user.avatar}</div>
              <div style={{fontFamily:"'Righteous',cursive",fontSize:22,color:"white"}}>{user.nom}</div>
              <div style={{color:"rgba(255,255,255,0.65)",fontSize:12,fontWeight:600,marginBottom:14}}>{user.classe}</div>
              <div style={{display:"flex",gap:10,justifyContent:"center",flexDirection:rtl?"row-reverse":"row"}}>
                {[{v:mesEmp.length,l:t.books},{v:bd.filter(b=>b.earned).length,l:t.badges},{v:"🥈",l:t.rank}].map((s,i)=>(
                  <div key={i} style={{background:"rgba(255,255,255,0.18)",backdropFilter:"blur(8px)",borderRadius:14,padding:"8px 14px"}}>
                    <div style={{fontWeight:900,fontSize:19,color:"white",fontFamily:"'Righteous',cursive"}}>{s.v}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.75)",fontWeight:700}}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{fontWeight:900,fontSize:15,color:"white",marginBottom:11,textAlign:rtl?"right":"left"}}>🏆 {t.badges}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:16}}>
              {bd.map(b=>(
                <div key={b.k} style={{background:b.earned?`${b.col}15`:"rgba(255,255,255,0.03)",border:`1px solid ${b.earned?b.col:"rgba(255,255,255,0.07)"}`,borderRadius:18,padding:"14px 7px",textAlign:"center",opacity:b.earned?1:0.35,position:"relative",boxShadow:b.earned?`0 4px 16px ${b.col}30`:"none",transition:"all .3s"}}>
                  {b.earned&&<div className="pop" style={{position:"absolute",top:-5,right:rtl?"auto":-5,left:rtl?-5:"auto",background:"#00E5A0",color:"#0a1a3e",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>✓</div>}
                  <div style={{fontSize:28,filter:b.earned?`drop-shadow(0 0 8px ${b.col})`:"none"}}>{b.earned?b.i:"🔒"}</div>
                  <div style={{fontSize:9,fontWeight:700,color:b.earned?"white":"rgba(255,255,255,0.2)",marginTop:5,lineHeight:1.3}}>{b.l}</div>
                </div>
              ))}
            </div>

            {mesEmp.length>0&&(
              <>
                <div style={{fontWeight:900,fontSize:15,color:"white",marginBottom:10,textAlign:rtl?"right":"left"}}>📤 {t.myLoans}</div>
                {mesEmp.map(e=>(
                  <div key={e.id} style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(8px)",borderRadius:18,padding:"12px 14px",marginBottom:9,display:"flex",alignItems:"center",gap:10,border:"1px solid rgba(255,255,255,0.06)",flexDirection:rtl?"row-reverse":"row"}}>
                    <span style={{fontSize:24}}>{e.livres?.cover_emoji||"📗"}</span>
                    <div style={{flex:1,textAlign:rtl?"right":"left"}}>
                      <div style={{fontWeight:800,fontSize:13,color:"white"}}>{e.livres?gt(e.livres):""}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontWeight:600}}>{t.retBy}: {new Date(e.date_retour_prevue).toLocaleDateString(lang==="ar"?"ar-DZ":lang==="en"?"en-GB":"fr-FR")}</div>
                    </div>
                    <button onClick={()=>ret(e.id,e.livre_id)} style={{background:"rgba(0,229,160,0.12)",color:"#00E5A0",borderRadius:12,padding:"7px 12px",fontSize:11,fontWeight:900,border:"1px solid rgba(0,229,160,0.25)"}}>{t.returnBtn}</button>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {/* ADMIN */}
        {page==="admin"&&user.role==="admin"&&(
          <div className="su" style={{padding:"16px 14px"}}>
            <div style={{fontFamily:"'Righteous',cursive",fontSize:24,color:"white",marginBottom:3,textAlign:rtl?"right":"left"}}>⚙️ Admin</div>
            <div style={{color:"rgba(255,255,255,0.35)",fontSize:12,fontWeight:600,marginBottom:16,textAlign:rtl?"right":"left"}}>BiblioMagie Dashboard 🚀</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[
                {i:"📚",v:livres.length,l:t.tBooks,g:"rgba(108,59,255,0.12)",b:"rgba(108,59,255,0.25)",c:"#C4B5FD"},
                {i:"👧",v:eleves.length,l:t.tStu,g:"rgba(0,229,160,0.1)",b:"rgba(0,229,160,0.25)",c:"#00E5A0"},
                {i:"📤",v:emps.length,l:t.tLoans,g:"rgba(255,216,77,0.1)",b:"rgba(255,216,77,0.25)",c:"#FFD84D"},
                {i:"⏰",v:emps.filter(e=>new Date(e.date_retour_prevue)<new Date()).length,l:t.tLate,g:"rgba(255,107,157,0.1)",b:"rgba(255,107,157,0.25)",c:"#FF6B9D"},
              ].map((s,i)=>(
                <div key={i} style={{background:s.g,borderRadius:18,padding:"14px 14px",backdropFilter:"blur(8px)",border:`1px solid ${s.b}`,textAlign:rtl?"right":"left"}}>
                  <div style={{fontSize:26,marginBottom:4}}>{s.i}</div>
                  <div style={{fontSize:26,fontWeight:900,color:s.c,fontFamily:"'Righteous',cursive"}}>{s.v}</div>
                  <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",fontWeight:700}}>{s.l}</div>
                </div>
              ))}
            </div>

            {emps.length>0&&(
              <>
                <div style={{fontWeight:900,fontSize:15,color:"white",marginBottom:10,textAlign:rtl?"right":"left"}}>📋 {t.tLoans}</div>
                {emps.slice(0,5).map(em=>(
                  <div key={em.id} style={{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(8px)",borderRadius:16,padding:"11px 13px",marginBottom:8,display:"flex",alignItems:"center",gap:9,border:"1px solid rgba(255,255,255,0.06)",flexDirection:rtl?"row-reverse":"row"}}>
                    <span style={{fontSize:22}}>{em.livres?.cover_emoji||"📗"}</span>
                    <div style={{flex:1,textAlign:rtl?"right":"left"}}>
                      <div style={{fontWeight:800,fontSize:12,color:"white"}}>{em.livres?gt(em.livres):""}</div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontWeight:600}}>{em.eleves?.avatar} {em.eleves?.nom}</div>
                    </div>
                    <button onClick={()=>ret(em.id,em.livre_id)} style={{background:"rgba(0,229,160,0.12)",color:"#00E5A0",borderRadius:9,padding:"5px 9px",fontSize:10,fontWeight:900,border:"1px solid rgba(0,229,160,0.25)"}}>✅</button>
                  </div>
                ))}
              </>
            )}

            <div style={{fontWeight:900,fontSize:15,color:"white",margin:"16px 0 10px",textAlign:rtl?"right":"left"}}>⚡ Actions</div>
            {[
              {i:"➕",l:t.addBook,g:G.hero,gl:"rgba(108,59,255,0.35)",a:()=>setShowAB(true)},
              {i:"👤",l:t.addStu,g:G.mint,gl:"rgba(0,229,160,0.25)",tc:"#0a1a3e",a:()=>setShowAS(true)},
              {i:"🔄",l:t.refresh,g:"rgba(0,194,255,0.1)",gl:"none",b:"rgba(0,194,255,0.25)",tc:"#00C2FF",a:async()=>{await loadAll(user.id,user.role);toast2("Actualisé !","🔄");}},
            ].map((x,i)=>(
              <button key={i} onClick={x.a} style={{width:"100%",background:x.g,borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:10,fontWeight:800,fontSize:13,color:x.tc||"white",boxShadow:`0 4px 16px ${x.gl}`,border:x.b?`1px solid ${x.b}`:"none",marginBottom:10,textAlign:rtl?"right":"left",flexDirection:rtl?"row-reverse":"row"}}>
                <span style={{fontSize:20}}>{x.i}</span>{x.l}
                <span style={{marginLeft:rtl?0:"auto",marginRight:rtl?"auto":0,opacity:.6}}>{rtl?"←":"→"}</span>
              </button>
            ))}

            {/* Footer */}
            <div style={{marginTop:24,padding:18,background:"rgba(255,255,255,0.03)",borderRadius:20,border:"1px solid rgba(255,255,255,0.06)",textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:8}}>🤲</div>
              <div style={{color:"rgba(255,255,255,0.25)",fontSize:11,fontWeight:600,lineHeight:1.9}}>
                BiblioMagie — صدقة جارية<br/>
                Sadaqa Jariya 🌍<br/>
                Pour les enfants du monde entier ❤️
              </div>
            </div>
          </div>
        )}
      </div>

      {/* NAVBAR */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(26,5,51,0.92)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(108,59,255,0.15)",padding:"8px 0 12px",display:"flex",justifyContent:"space-around",zIndex:100,maxWidth:480,margin:"0 auto",flexDirection:rtl?"row-reverse":"row"}}>
        {[{i:"🏠",l:t.home,p:"home"},{i:"📚",l:t.cat,p:"catalogue"},{i:"🎧",l:t.listen,p:"listen"},{i:"👤",l:t.profile,p:"profile"},...(user.role==="admin"?[{i:"⚙️",l:t.admin,p:"admin"}]:[])].map(n=>(
          <button key={n.p} onClick={()=>setPage(n.p)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 10px",borderRadius:14,background:page===n.p?"rgba(108,59,255,0.18)":"transparent",border:page===n.p?"1px solid rgba(108,59,255,0.25)":"1px solid transparent"}}>
            <span style={{fontSize:20,filter:page===n.p?"drop-shadow(0 0 6px rgba(108,59,255,0.8))":"none"}}>{n.i}</span>
            <span style={{fontSize:9,fontWeight:700,color:page===n.p?"#C4B5FD":"rgba(255,255,255,0.3)"}}>{n.l}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
